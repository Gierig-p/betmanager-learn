<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BetManager - Calculadora de Apostas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>BetManager</h1>
    <p>Bem-vindo ao sistema de gerenciamento de apostas!</p>
    
    <h2>Adicionar Odd</h2>
    <form>
        <label>Valor (R$):</label>
        <input type="number" placeholder="100.00">
        
        <label>Odd:</label>
        <input type="number" placeholder="2.50" step="0.01">
        
        <button type="submit">Adicionar</button>
    </form>
    <script src="script.js"></script>
</body>
</html>
